appname = caelum-backend
httpport = 8080
runmode = dev

# 数据库配置
db.type = mysql
db.host = 127.0.0.1
db.port = 3306
db.database = caelum
db.username = root
db.password = root
db.charset = utf8mb4

# Redis配置
redis.host = 127.0.0.1
redis.port = 6379
redis.password = 
redis.db = 0

# JWT配置
jwt.secret = caelum-secret-key-2024
jwt.expire = 720

# 日志配置
logs.level = debug
logs.enableFunc = true
logs.enableFile = true
logs.maxSize = 100
logs.maxDays = 7
logs.adapter = file